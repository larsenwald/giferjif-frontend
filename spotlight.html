<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spotlight</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: auto;
      overflow: hidden;
      background: #161b27;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* ── Search bar ── */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      height: 56px;
      flex-shrink: 0;
    }

    .search-icon {
      font-size: 1.3rem;
      color: #6b7a99;
      flex-shrink: 0;
      user-select: none;
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 1.15rem;
      font-weight: 700;
      color: #e8eaf0;
      caret-color: #00d4aa;
    }

    .search-input::placeholder { color: #3a4460; }

    .close-btn {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border: 2px solid rgba(255,255,255,0.08);
      background: transparent;
      color: #6b7a99;
      font-size: 0.7rem;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.1s, color 0.1s;
    }

    .close-btn:hover { border-color: #ff5a5f; color: #ff5a5f; }

    /* ── Divider ── */
    .divider {
      height: 0;
      background: rgba(255,255,255,0.06);
      transition: height 0.1s;
    }

    .divider.visible { height: 1px; }

    /* ── Results ── */
    .results {
      display: none;
      padding: 12px;
      max-height: 480px;
      overflow-y: auto;
    }

    .results.visible { display: block; }

    .status {
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
      color: #3a4460;
      letter-spacing: 0.06em;
      padding: 0 2px 10px;
    }

    /* ── Grid ── */
    .gif-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    /* ── Card ── */
    .gif-card {
      border: 2px solid rgba(255,255,255,0.06);
      background: #1e2433;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.12s, transform 0.12s;
    }

    .gif-card:hover { border-color: #00d4aa; transform: translateY(-2px); }

    .gif-card__media {
      width: 100%;
      height: 100px;
      background: #232a3b;
      overflow: hidden;
      position: relative;
    }

    .gif-card__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.15s;
      position: absolute;
      inset: 0;
    }

    .gif-card__img.loaded { opacity: 1; }

    .gif-card__placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 800;
      color: #3a4460;
      background: repeating-linear-gradient(
        135deg, #1e2433, #1e2433 8px, #232a3b 8px, #232a3b 16px
      );
    }

    .gif-card__actions {
      display: flex;
      gap: 4px;
      padding: 6px;
    }

    .gif-card__btn {
      flex: 1;
      padding: 5px 2px;
      border: 2px solid rgba(255,255,255,0.06);
      font-size: 0.6rem;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.1s, background 0.1s;
      letter-spacing: 0.02em;
    }

    .gif-card__btn--paste {
      background: #00d4aa;
      color: #0f1117;
      border-color: #00d4aa;
    }

    .gif-card__btn--paste:hover { background: #00bfa0; border-color: #00bfa0; }

    .gif-card__btn--copy {
      background: transparent;
      color: #6b7a99;
    }

    .gif-card__btn--copy:hover { border-color: #6b7a99; color: #e8eaf0; }

    .gif-card__btn--copied {
      background: #3b82f6 !important;
      border-color: #3b82f6 !important;
      color: #fff !important;
    }
  </style>
</head>
<body>
  <div class="search-bar">
    <span class="search-icon">⌕</span>
    <input
      class="search-input"
      id="searchInput"
      type="text"
      placeholder="Search GIFs..."
      autocomplete="off"
    />
    <button class="close-btn" onclick="dismiss()">✕</button>
  </div>

  <div class="divider" id="divider"></div>
  <div class="results" id="results">
    <div class="status" id="status"></div>
    <div class="gif-grid" id="gifGrid"></div>
  </div>

  <script>
    const KLIPY_KEY = '2BALsUj12qaYJLTPeTY0G5aXIs3XpUkKwz5AeUAS9746yeWoKs3Tl6fTOSOcWfIr';
    const API_BASE  = `https://api.klipy.com/api/v1/${KLIPY_KEY}`;
    const SEARCH_BAR_H = 56;
    const MAX_H = 560;

    let debounceTimer = null;
    let currentQuery = '';

    document.getElementById('searchInput').focus();

    // ── Dismiss ──────────────────────────────────────────────────────────────

    function dismiss() {
      if (window.pywebview?.api?.close_spotlight) {
        window.pywebview.api.close_spotlight();
      }
    }

    // ── Resize ───────────────────────────────────────────────────────────────

    function snapHeight() {
      if (!window.pywebview?.api?.resize) return;
      const h = Math.min(document.body.scrollHeight, MAX_H);
      window.pywebview.api.resize(document.documentElement.scrollWidth, h);
    }

    function collapse() {
      document.getElementById('divider').classList.remove('visible');
      document.getElementById('results').classList.remove('visible');
      if (window.pywebview?.api?.resize) {
        window.pywebview.api.resize(document.documentElement.scrollWidth, SEARCH_BAR_H);
      }
    }

    function expand() {
      document.getElementById('divider').classList.add('visible');
      document.getElementById('results').classList.add('visible');
      requestAnimationFrame(snapHeight);
    }

    // ── Initial snap on load ─────────────────────────────────────────────────

    window.addEventListener('pywebviewready', function() {
      requestAnimationFrame(function() {
        const h = document.querySelector('.search-bar').getBoundingClientRect().height;
        window.pywebview.api.resize(document.documentElement.scrollWidth, Math.ceil(h));
      });
    });

    // ── Search ───────────────────────────────────────────────────────────────

    document.getElementById('searchInput').addEventListener('input', function() {
      const q = this.value.trim();
      clearTimeout(debounceTimer);

      if (!q) {
        collapse();
        currentQuery = '';
        return;
      }

      debounceTimer = setTimeout(() => search(q), 300);
    });

    async function search(q) {
      currentQuery = q;
      setStatus('SEARCHING...');
      document.getElementById('gifGrid').innerHTML = '';
      expand();

      try {
        const res = await fetch(
          `${API_BASE}/gifs/search?q=${encodeURIComponent(q)}&per_page=12`
        );

        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        const gifs = data.data?.data ?? [];

        if (currentQuery !== q) return;

        if (gifs.length === 0) {
          setStatus('NO RESULTS');
        } else {
          setStatus(`${gifs.length} RESULT${gifs.length === 1 ? '' : 'S'}`);
          renderGrid(gifs);
        }

        requestAnimationFrame(snapHeight);
      } catch (e) {
        if (currentQuery !== q) return;
        setStatus('COULD NOT REACH SERVER');
        requestAnimationFrame(snapHeight);
      }
    }

    // ── Render ───────────────────────────────────────────────────────────────

    function renderGrid(gifs) {
      const grid = document.getElementById('gifGrid');
      grid.innerHTML = '';

      gifs.forEach((raw, i) => {
        const gif = normalize(raw, i);
        const card = document.createElement('div');
        card.className = 'gif-card';
        card.innerHTML = `
          <div class="gif-card__media">
            <div class="gif-card__placeholder">LOADING</div>
            <img class="gif-card__img" src="${escHtml(gif.imageUrl)}" alt="${escHtml(gif.title)}" />
          </div>
          <div class="gif-card__actions">
            <button class="gif-card__btn gif-card__btn--paste">COPY + PASTE</button>
            <button class="gif-card__btn gif-card__btn--copy">COPY</button>
          </div>
        `;

        const img = card.querySelector('img');
        const placeholder = card.querySelector('.gif-card__placeholder');

        img.addEventListener('load', () => {
          img.classList.add('loaded');
          placeholder.style.display = 'none';
        });

        img.addEventListener('error', () => {
          placeholder.textContent = 'NO PREVIEW';
        });

        card.querySelector('.gif-card__btn--paste').addEventListener('click', () => {
          copyAndPaste(gif.copyUrl || gif.imageUrl);
        });

        card.querySelector('.gif-card__btn--copy').addEventListener('click', (e) => {
          copyOnly(gif.copyUrl || gif.imageUrl, e.currentTarget);
        });

        grid.appendChild(card);
      });

      requestAnimationFrame(snapHeight);
    }

    // ── Actions ──────────────────────────────────────────────────────────────

    function copyAndPaste(url) {
      if (window.pywebview?.api?.copy_and_paste_gif) {
        window.pywebview.api.copy_and_paste_gif(url);
      } else {
        navigator.clipboard.writeText(url).catch(() => {});
        dismiss();
      }
    }

    function copyOnly(url, btn) {
      navigator.clipboard.writeText(url).catch(() => {});
      if (window.pywebview?.api?.copy_gif) {
        window.pywebview.api.copy_gif(url);
      }
      const orig = btn.textContent;
      btn.textContent = 'COPIED!';
      btn.classList.add('gif-card__btn--copied');
      setTimeout(() => {
        btn.textContent = orig;
        btn.classList.remove('gif-card__btn--copied');
      }, 1400);
    }

    // ── Helpers ──────────────────────────────────────────────────────────────

    function normalize(raw, i) {
      return {
        id:       String(raw.id ?? raw.slug ?? i),
        title:    raw.title ?? 'Untitled GIF',
        imageUrl: raw.file?.sm?.gif?.url ?? raw.file?.md?.gif?.url ?? '',
        copyUrl:  raw.file?.hd?.gif?.url ?? raw.file?.md?.gif?.url ?? '',
      };
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;');
    }

    // ── Keyboard / blur ──────────────────────────────────────────────────────

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') dismiss();
    });

    window.addEventListener('blur', function() {
      dismiss();
    });

    document.addEventListener('mousedown', function(e) {
      e.preventDefault();
      e.stopPropagation();
    });
  </script>
</body>
</html>
